<!DOCTYPE html>
<html>
<head><title>Puppies</title></head>
<body style="font-family: 'Segoe UI', sans-serif; margin: 40px; background: #0a0a0a; color: #fff;">
    <a href="/kennel" style="color: #C0C0C0; text-decoration: none;">← Back to Kennel Dashboard</a>
    <h1 style="color: #fff; border-bottom: 2px solid #D32F2F; padding-bottom: 10px;">🐾 Available Puppies</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
        {% for pup in puppies %}
        <div style="background: #1a1a1a; border: 1px solid #444; padding: 20px; border-radius: 10px; text-align: center;">
            <h2 style="color: #D32F2F; margin-top: 0;">{{ pup.name }} 🐶</h2>
            <p style="color: #C0C0C0;">{{ pup.gender }} {{ pup.breed }}</p>
            {% if pup.is_available %}
                <p style="color: #27ae60; font-weight: bold;">Available</p>
                <a href="/reserve/{{ pup.id }}" style="background: #D32F2F; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold;">Reserve Pup</a>
            {% else %}
                <p style="color: #555;">Sold</p>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
