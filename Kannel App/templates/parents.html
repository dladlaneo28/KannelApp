<!DOCTYPE html>
<html>
<head><title>Pedigree Parents</title></head>
<body style="font-family: sans-serif; margin: 40px; background: #f0f2f5;">
    <a href="/">← Back</a>
    <h1>🐕 Pedigree Index Cards</h1>

    {% if current_user.is_authenticated %}
    <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
        <h3>Add New Parent (Admin)</h3>
        <form method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <select name="role"><option value="Sire">Sire</option><option value="Dam">Dam</option></select>
            <input type="text" name="breed" placeholder="Breed">
            <input type="text" name="achievements" placeholder="Achievements">
            <input type="text" name="health_status" placeholder="Health Status">
            <textarea name="bio" placeholder="Bio"></textarea>
            <button type="submit">Add Dog</button>
        </form>
    </div>
    {% endif %}

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        {% for p in sires + dams %}
        <div style="background: white; width: 280px; padding: 20px; border-left: 8px solid #2c3e50; border-radius: 5px;">
            <small style="color: gray;">{{ p.role }}</small>
            <h2>{{ p.name }}</h2>
            <p><strong>Breed:</strong> {{ p.breed }}</p>
            <p><strong>Health:</strong> {{ p.health_status }}</p>
            <p><i>{{ p.bio }}</i></p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
