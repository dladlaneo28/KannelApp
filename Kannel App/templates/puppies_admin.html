<!DOCTYPE html>
<html>
<head><title>Puppy Manager</title></head>
<body style="font-family: 'Segoe UI', sans-serif; margin: 40px; background: #0a0a0a; color: #fff;">
    <a href="/kennel" style="color: #C0C0C0; text-decoration: none;">← Back to Kennel Dashboard</a>
    <h1 style="color: #fff; border-bottom: 2px solid #D32F2F; padding-bottom: 10px;">Add Puppies to Gallery</h1>
    <form method="POST" style="background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #444;">
        <input type="text" name="name" placeholder="Puppy Name" required style="background: #222; border: 1px solid #444; color: #fff; padding: 8px; margin-right: 10px;">
        <input type="text" name="breed" placeholder="Breed" required style="background: #222; border: 1px solid #444; color: #fff; padding: 8px; margin-right: 10px;">
        <select name="gender" style="background: #222; border: 1px solid #444; color: #fff; padding: 8px; margin-right: 10px;">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <input type="number" name="price" placeholder="Price (R)" required style="background: #222; border: 1px solid #444; color: #fff; padding: 8px; margin-right: 10px;">
        <button type="submit" style="background: #D32F2F; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Add to Public Gallery</button>
    </form>
</body>
</html>
