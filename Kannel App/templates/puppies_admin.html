<!DOCTYPE html>
<html>
<head><title>Puppy Manager</title></head>
<body style="font-family: sans-serif; margin: 40px;">
    <h1>Add Puppies to Gallery</h1>
    <form method="POST" style="background: #eee; padding: 20px; border-radius: 10px;">
        <input type="text" name="name" placeholder="Puppy Name" required>
        <input type="text" name="breed" placeholder="Breed" required>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <input type="number" name="price" placeholder="Price (R)" required>
        <button type="submit">Add to Public Gallery</button>
    </form>
</body>
</html>
